<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login - KSWF</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Lora:ital,wght@0,400;0,700;1,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      .login-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: var(--bg-color);
        padding: 2rem;
      }
      .login-card {
        background: white;
        padding: 3rem;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        width: 100%;
        max-width: 400px;
        text-align: center;
      }
      .login-card img {
        max-width: 150px;
        margin-bottom: 2rem;
      }
      .error-message {
        color: #e53935;
        font-family: var(--font-sans);
        font-size: 0.9rem;
        margin-bottom: 1rem;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="login-card">
        <img src="images/kswf-logo.png" alt="KSWF Logo" />
        <h2 style="font-size: 1.8rem; margin-bottom: 1.5rem;">Admin Access</h2>
        <div id="error-msg" class="error-message">Invalid credentials</div>
        <form id="login-form">
          <div class="form-group text-left" style="text-align: left;">
            <label class="form-label">Password</label>
            <input type="password" id="password" class="form-control" required />
          </div>
          <button type="submit" class="btn w-full mt-2" style="font-size: 1.1rem" id="login-btn">
            Login
          </button>
        </form>
        <p class="font-sans text-muted mt-2" style="font-size: 0.85rem">
          <a href="index.html" style="color: #666; text-decoration: underline;">&larr; Back to Website</a>
        </p>
      </div>
    </div>
    
    <!-- Scripts -->
    <script src="js/supabase-config.js"></script>
    <script src="js/admin-auth.js"></script>
  </body>
</html>
