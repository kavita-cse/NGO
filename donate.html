<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Donate - Kaarn Social Welfare Foundation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Lora:ital,wght@0,400;0,700;1,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="header">
      <nav class="nav-container">
        <div class="logo">
          <a href="index.html" class="flex items-center"
            ><img src="images/kswf-logo.png" alt="KSWF Logo"
          /></a>
        </div>
        <div class="nav-links">
          <a href="index.html">Home</a>
          <a href="about.html">About</a>
          <a href="programs.html">Projects</a>
          <a href="contact.html">contact</a>
        </div>
      </nav>
    </header>

    <main>
      <section class="section container" style="max-width: 600px">
        <div class="card card-light">
          <h1 class="text-center mb-1" style="color: var(--button-bg)">
            Make a Donation
          </h1>
          <p class="text-center font-sans text-muted mb-2">
            "Your contribution creates real impact."
          </p>

          <form
            action="#"
            method="POST"
            onsubmit="
              event.preventDefault();
              alert('Thank you for your generous donation!');
            "
          >
            <div class="form-group">
              <label class="form-label">Donation Amount (USD)</label>
              <div class="btn-group">
                <button type="button" class="btn btn-outline">$10</button>
                <button type="button" class="btn btn-outline">$25</button>
                <button type="button" class="btn btn-outline">$50</button>
                <button type="button" class="btn btn-outline active">
                  $100
                </button>
              </div>
              <input
                type="number"
                class="form-control mt-0-5"
                placeholder="Other Amount"
              />
            </div>

            <div class="form-group">
              <label class="form-label">Full Name</label>
              <input
                type="text"
                class="form-control"
                required
                placeholder="John Doe"
              />
            </div>

            <div class="form-group">
              <label class="form-label">Email Address</label>
              <input
                type="email"
                class="form-control"
                required
                placeholder="john@example.com"
              />
            </div>

            <div class="form-group">
              <label class="form-label">Payment Details (Placeholder)</label>
              <div class="payment-placeholder">
                <span class="font-sans text-muted-light"
                  >Secure Payment Gateway Integration Goes Here</span
                >
              </div>
            </div>

            <button
              type="submit"
              class="btn btn-success w-full mt-1"
              style="font-size: 1.1rem"
            >
              Donate Now
            </button>
          </form>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="container">
        <div class="footer-links">
          <a href="index.html">Home</a>
          <a href="about.html">About</a>
          <a href="programs.html">Projects</a>
          <a href="donate.html">Donate</a>
          <a href="get-involved.html">Get Involved</a>
          <a href="blog.html">Blog</a>
          <a href="contact.html">Contact</a>
        </div>
        <p class="footer-text">
          &copy; 2026 Kaarn Social Welfare Foundation. All rights reserved.
        </p>
      </div>
    </footer>
    <script src="js/main.js"></script>
  </body>
</html>
